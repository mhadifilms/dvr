name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # for trusted publishing to PyPI

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for hatch-vcs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Notify homebrew-tap to bump formula
        if: success()
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set; skipping tap dispatch."
            echo "To enable, create a PAT with repo scope on mhadifilms/homebrew-tap"
            echo "and add it as a repository secret named HOMEBREW_TAP_TOKEN."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/mhadifilms/homebrew-tap/dispatches \
            -f event_type=dvr-release \
            -f client_payload[version]="$VERSION"
