site_name: dvr
site_description: The missing CLI and Python library for DaVinci Resolve. Declarative, scriptable, LLM-friendly.
site_url: https://mhadifilms.github.io/dvr/
repo_url: https://github.com/mhadifilms/dvr
repo_name: mhadifilms/dvr
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Cookbook: cookbook.md
  - Concepts:
      - Errors and diagnostics: concepts/errors.md
      - Inspection: concepts/inspect.md
      - Idempotency: concepts/idempotency.md
  - CLI: cli.md
  - Python library: library.md
  - Daemon mode: daemon.md
  - MCP server: mcp.md
  - Declarative specs: spec.md
  - API reference:
      - dvr: api/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mhadifilms/dvr

extra_css:
  - stylesheets/extra.css
